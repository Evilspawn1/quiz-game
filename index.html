<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>🎮 Game Hub</h1>
  <button id="startBtn">Start</button>
</div>

<!-- GAME SELECTION -->
<div id="gameSelectScreen" class="hidden">
  <h1>Spiel auswählen</h1>

  <div id="gameList">
    <div class="gameCard" onclick="startQuizGame()">
      Quiz Game
    </div>

    <div class="gameCard disabled">
      Weitere Spiele bald...
    </div>
  </div>
</div>

<!-- QUIZ GAME -->
<div id="gameScreen" class="hidden">
  <h1>🎮 Quiz Game</h1>
  <div id="board"></div>
</div>

<!-- QUESTION SCREEN -->
<div id="questionScreen" class="hidden">
  <h1 id="question"></h1>

  <input id="answer" placeholder="Antwort eingeben">
  <button onclick="checkAnswer()">Antwort prüfen</button>
</div>

<!-- JOIN SCREEN -->
<div id="joinScreen" class="hidden">
  <h1>Lobby beitreten</h1>

  <input id="playerName" placeholder="Dein Name">

  <div id="lobbyInputWrapper">
  <input id="lobbyInput" placeholder="Lobby Code">
  </div>

  <button onclick="joinByCode()">Beitreten</button>
</div>

<!-- Lobbyscreen -->
<div id="hostLobbyScreen" class="hidden">
  <h1>🏠 Lobby</h1>

  <h2>Code: <span id="lobbyCode"></span></h2>

  <button onclick="copyLink()">📋 Link kopieren</button>

  <h3>Spieler:</h3>
  <div id="playerList"></div>

  <button onclick="startGame()">🚀 Spiel starten</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
